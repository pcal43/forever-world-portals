# Forever World Portals configuration.

# If you have questions, please go to https://discord.pcal.net

# Whether players should be required to drop all of their items (including
# carried and worn items) before the portal will activate.  Setting this to
# false will give you much less of a sense of going back to the early-game.
requireEmptyInventory=true

# The block from which Forever World Portals should be constructed.
portalFrameBlock=minecraft:diamond_block

# How return portals should be generated.  Accepted values are:Generated
# return portal behavior.
#   RUINED - generate a ruined portal that must be rebuilt with diamond blocks (or whatever portalFrameBlock is set to).
#   NONE - don't generate any return portal.  It's a one-way trip (unless you're ready for a long walk)
#   COMPLETE - generate a fully-functional return portal.  Potentially exploitable (free diamonds!)
returnPortalMode=RUINED

# Minimum logging level.  Supported values: TRACE, DEBUG, INFO, WARN, ERROR.
logLevel=INFO

# Minimum distance (in blocks) that portals will take you to from any existing
# generated chunk.  In practice, the distance will usually be more than this.
minTeleportDistance=10000

# Spacing between square-spiral destination search centers, in blocks.  This
# should usually be the same as minTeleportDistance.
spiralSearchSpacing=10000

# Maximum number of spiral positions to examine during one destination search.
maxSpiralSearchPositions=512

# Maximum number of expensive biome-locator searches to perform during one
# destination search.
maxBiomeSearches=64

# Maximum number of concrete generated-portal layout evaluations to perform for
# one eligible biome result before the outer search moves on.
maxPortalPlacementAttemptsPerBiome=64

#
# These settings ONLY apply on the client.
#

# Fixed client-side color for Forever World portal rendering, in #RRGGBB form.
client.portalColor=#4CAF50
