# Forever World Portals configuration.
# Set to false to disable Forever World portal behavior without removing the mod.
enabled=true

# Require players to carry absolutely nothing before a Forever World portal will
# begin its portal activation sequence.
requireEmptyInventory=true

# Supported levels: TRACE, DEBUG, INFO, WARN, ERROR.
logLevel=INFO

# Frame block for Forever World portals.
frameBlock=minecraft:diamond_block

# Item used to activate Forever World portals.
activationItem=minecraft:flint_and_steel

# Return-portal behavior. Supported values: GENERATE, REQUIRE_PLAYER_BUILD, NONE.
returnPortalMode=GENERATE

# Generated destination portal behavior. Accepted values: none, broken, complete.
server.destinationPortalMode=broken

# Spacing between square-spiral destination search centers, in blocks.
destinationSpiralSpacingBlocks=10000

# Maximum number of spiral positions to examine during one destination search.
maximumSpiralSearchPositions=512

# Maximum number of expensive biome-locator searches to perform during one
# destination search.
maximumBiomeSearches=64

# Maximum number of concrete generated-portal layout evaluations to perform for
# one eligible biome result before the outer search moves on.
maximumPortalPlacementAttemptsPerBiome=64

# Minimum Chebyshev distance from previously generated terrain, based on the
# frozen region-file snapshot taken at the start of each destination search.
minimumGeneratedTerrainDistanceBlocks=10000
